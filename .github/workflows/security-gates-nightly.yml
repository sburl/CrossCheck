name: Security Gates (Nightly)

on:
  schedule:
    - cron: "45 3 * * *"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run repository secret scan (repo + history + logs)
        run: |
          bash scripts/scan-secrets.sh --all
